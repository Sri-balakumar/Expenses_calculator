<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plan — Expense Calculator</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <script src="js/theme.js"></script>
</head>
<body>
  <div class="container">

    <div class="header">
      <div>
        <a href="dashboard.html" class="back-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          Back
        </a>
        <h1 id="plan-month-name" class="month-title">Loading...</h1>
      </div>
      <div id="header-actions"></div>
    </div>

    <div id="loading-card" class="card">
      <p class="muted">Loading...</p>
    </div>

    <!-- Month figures -->
    <div id="plan-figures" class="card hidden" style="padding: 18px 22px;">
      <div class="plan-figures-row">
        <div class="pf-cell">
          <span class="pf-label">Current balance</span>
          <span class="pf-val" id="pf-balance">₹0</span>
        </div>
        <div class="pf-cell">
          <span class="pf-label">Total remaining</span>
          <span class="pf-val" id="pf-remaining">₹0</span>
        </div>
      </div>
      <div class="plan-figures-sub">
        Planned <strong id="pf-planned">₹0</strong>
        <span class="dot">·</span>
        Spent <strong id="pf-spent">₹0</strong>
      </div>
    </div>

    <!-- Plan table -->
    <div id="plan-table-card" class="card hidden">
      <div class="plan-table-head">
        <h2 style="margin:0;">Plans</h2>
        <button class="btn-secondary" id="transfer-all-btn" style="padding:9px 14px;">Transfer pending →</button>
      </div>
      <div class="plan-table-wrap">
        <table class="plan-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Planned → Paid</th>
              <th>Category</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="plan-rows"></tbody>
          <tbody id="plan-add">
            <tr class="plan-add-row">
              <td><input type="text" id="add-name" placeholder="e.g. Recharge"></td>
              <td><input type="number" id="add-amount" placeholder="0" min="0"></td>
              <td><select id="add-cat" class="plan-select"></select></td>
              <td class="muted">New</td>
              <td><button class="btn-primary plan-add-btn" id="add-plan-btn">Add</button></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script src="js/firebase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/admin-config.js"></script>
  <script src="js/plan.js"></script>
  <script src="js/pwa.js"></script>

  <script>
    mountThemeToggle(document.getElementById("header-actions"));
    loadPlan();
  </script>
</body>
</html>
