<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — Admin</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6366f1">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <script src="js/theme.js"></script>
</head>
<body>
  <div class="container">

    <div class="header">
      <div>
        <a href="admin.html" class="back-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          Back to Admin
        </a>
        <h1 class="month-title">Settings</h1>
      </div>
      <div id="header-actions"></div>
    </div>

    <div id="loading-card" class="card">
      <p class="muted">Loading...</p>
    </div>

    <div id="settings-card" class="card hidden">
      <h2 style="margin-top:0;">Profile</h2>
      <div class="settings-row">
        <div class="settings-label">Email</div>
        <div class="settings-value" id="settings-email">—</div>
      </div>
      <div class="settings-row">
        <div class="settings-label">Role</div>
        <div class="settings-value">
          <span class="role-badge" style="margin-left:0;">Admin</span>
        </div>
      </div>
      <div class="settings-row">
        <div class="settings-label">User ID</div>
        <div class="settings-value" id="settings-uid" style="font-family: monospace; font-size: 0.78rem;">—</div>
      </div>
    </div>

    <div id="app-card" class="card hidden">
      <h2 style="margin-top:0;">App</h2>
      <div class="settings-row">
        <div class="settings-label">App name</div>
        <div class="settings-value">Expense Calculator</div>
      </div>
      <div class="settings-row">
        <div class="settings-label">Admin email</div>
        <div class="settings-value" id="settings-admin-email">—</div>
      </div>
      <div class="settings-row">
        <div class="settings-label">Allowed signups</div>
        <div class="settings-value">@gmail.com only</div>
      </div>
    </div>

    <div id="actions-card" class="card hidden">
      <h2 style="margin-top:0;">Account</h2>
      <button class="btn-danger" id="signout-btn" style="width:100%; margin-top: 8px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign out
      </button>
    </div>

  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/admin-config.js"></script>

  <script>
    const loadingCard = document.getElementById("loading-card");
    const settingsCard = document.getElementById("settings-card");
    const appCard = document.getElementById("app-card");
    const actionsCard = document.getElementById("actions-card");

    mountThemeToggle(document.getElementById("header-actions"));

    (async function init() {
      const user = await waitForAuth();
      if (!user) {
        window.location.href = "admin-login.html";
        return;
      }
      if (!isAdmin(user)) {
        showToast("Admin access required.", "error");
        setTimeout(function () { window.location.href = "index.html"; }, 800);
        return;
      }

      document.getElementById("settings-email").textContent = user.email;
      document.getElementById("settings-uid").textContent = user.uid;
      document.getElementById("settings-admin-email").textContent = ADMIN_EMAIL;

      loadingCard.classList.add("hidden");
      settingsCard.classList.remove("hidden");
      appCard.classList.remove("hidden");
      actionsCard.classList.remove("hidden");
    })();

    document.getElementById("signout-btn").addEventListener("click", async function () {
      const ok = await showConfirm({
        title: "Sign out?",
        message: "You'll need to log back in to access the admin panel.",
        confirmText: "Sign out",
        danger: false
      });
      if (ok) {
        await auth.signOut();
        window.location.href = "admin-login.html";
      }
    });
  </script>
</body>
</html>
