<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Expense Calculator</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <script src="js/theme.js"></script>
</head>
<body>
  <div class="container">

    <div class="header">
      <div>
        <div class="greeting" id="greeting">Hi</div>
        <div class="salary" id="salary"></div>
      </div>
      <div style="display:flex;gap:6px;align-items:center;" id="header-actions">
        <a href="profile.html" class="logout-link" title="Profile">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Profile
        </a>
        <button class="logout-link" id="logout-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sign out
        </button>
      </div>
    </div>

    <!-- Mode tabs -->
    <div class="tab-toggle dash-tabs">
      <button class="tab-btn active" id="tab-monthly">📅 Monthly</button>
      <button class="tab-btn" id="tab-budgets">🎯 Budgets</button>
    </div>

    <!-- LOADING SKELETONS (shown until data is fetched) -->
    <div id="dash-loading">
      <div class="skeleton-card"><div class="skeleton skeleton-line title"></div><div class="skeleton skeleton-line medium"></div></div>
      <div class="skeleton-card"><div class="skeleton skeleton-line title"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line"></div></div>
      <div class="skeleton-card"><div class="skeleton skeleton-line short"></div><div class="skeleton skeleton-line medium"></div></div>
    </div>

    <!-- MONTHLY VIEW -->
    <div id="monthly-view" class="hidden">
      <div id="comparison-card" class="card hidden" style="padding: 18px 22px; margin-bottom: 16px;">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;">
          <div>
            <div class="total-label" style="opacity:0.7;">This month spend</div>
            <div style="font-size:1.5rem;font-weight:800;letter-spacing:-0.01em;" id="this-month-amount">—</div>
            <div class="muted" id="this-month-name" style="font-size:0.85rem;"></div>
          </div>
          <div id="comparison-pill" style="text-align:right;"></div>
        </div>
      </div>

      <div id="insights-card" class="card insights-card hidden">
        <h2 style="margin-top:0;">Insights</h2>
        <div id="insights-list"></div>
      </div>

      <div id="trends-card" class="card hidden" style="padding: 18px 22px; margin-bottom: 16px;">
        <h2 style="margin-top:0;">Spending Trends</h2>
        <div style="position:relative;height:200px;">
          <canvas id="trends-chart"></canvas>
        </div>
      </div>

      <div id="ytd-pie-card" class="card hidden" style="padding: 18px 22px; margin-bottom: 16px;">
        <h2 style="margin-top:0;">Year-to-Date by Category</h2>
        <div style="position:relative;height:220px;">
          <canvas id="ytd-pie-chart"></canvas>
        </div>
      </div>

      <div style="display:flex;gap:10px;margin-bottom:24px;">
        <button class="btn-primary" id="new-month-btn" style="flex:1;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Month
        </button>
        <a href="year.html" class="btn-secondary" style="display:inline-flex;align-items:center;gap:8px;padding:13px 18px;border-radius:12px;font-weight:600;text-decoration:none;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Year View
        </a>
      </div>

      <h2>Your Months</h2>
      <div id="months-list"></div>
      <div id="months-empty" class="empty-state hidden">
        <div class="empty-state-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>
        <p>No months yet. Tap <strong>+ New Month</strong> to start tracking.</p>
      </div>
    </div>

    <!-- BUDGETS VIEW -->
    <div id="budgets-view" class="hidden">
      <button class="btn-primary" id="new-budget-btn" style="margin-bottom: 24px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Budget
      </button>

      <h2>Your Budgets</h2>
      <p class="muted" style="margin-top:-8px;margin-bottom:14px;font-size:0.88rem;">
        Track expenses for a specific amount — trips, events, projects.
      </p>
      <div id="budgets-list"></div>
      <div id="budgets-empty" class="empty-state hidden">
        <div class="empty-state-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
        </div>
        <p>No budgets yet. Tap <strong>+ New Budget</strong> to start.</p>
      </div>
    </div>

  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <script src="js/firebase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/admin-config.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/pwa.js"></script>

  <script>
    document.getElementById("new-month-btn").addEventListener("click", createNewMonth);
    document.getElementById("new-budget-btn").addEventListener("click", createNewBudget);
    document.getElementById("logout-btn").addEventListener("click", signOutUser);
    document.getElementById("tab-monthly").addEventListener("click", function () { switchDashTab("monthly"); });
    document.getElementById("tab-budgets").addEventListener("click", function () { switchDashTab("budgets"); });
    mountThemeToggle(document.getElementById("header-actions"));
    loadDashboard();
  </script>
</body>
</html>
