<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Calculator</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Expenses">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <script src="js/theme.js"></script>
</head>
<body class="auth-page">
  <div class="container container-narrow">

    <div class="auth-brand">
      <div class="auth-logo">₹</div>
      <h1>Expense Calculator</h1>
      <p class="subtitle">Track your money. Save more.</p>
      <p style="text-align:center;margin-top:8px;font-size:0.82rem;">
        <a href="admin-login.html" style="color:rgba(255,255,255,0.85);">🛡️ Admin login</a>
      </p>
    </div>

    <div id="loading-card" class="card">
      <p class="muted">Loading...</p>
    </div>

    <div id="auth-card" class="card hidden">

      <div class="tab-toggle">
        <button class="tab-btn active" id="tab-login">Log In</button>
        <button class="tab-btn" id="tab-signup">Sign Up</button>
      </div>

      <div id="status-msg" class="status-msg error hidden"></div>

      <!-- LOGIN FORM -->
      <form id="login-form" class="auth-form">
        <div class="form-group">
          <label for="login-email">Email</label>
          <div class="input-wrap">
            <input type="email" id="login-email" placeholder="you@gmail.com" autocomplete="email" required>
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </div>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <div class="input-wrap">
            <input type="password" id="login-password" placeholder="At least 6 characters" autocomplete="current-password" required>
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </div>
        </div>
        <button type="submit" class="btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          Log in
        </button>
        <p style="text-align:center;margin:6px 0 0;font-size:0.85rem;">
          <a href="#" id="forgot-link">Forgot password?</a>
        </p>
      </form>

      <!-- SIGNUP FORM -->
      <form id="signup-form" class="auth-form hidden">
        <div class="form-group">
          <label for="signup-name">Your name</label>
          <div class="input-wrap">
            <input type="text" id="signup-name" placeholder="e.g. Sribabu" autocomplete="name" required>
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
        </div>
        <div class="form-group">
          <label for="signup-email">Email</label>
          <div class="input-wrap">
            <input type="email" id="signup-email" placeholder="you@gmail.com" autocomplete="email" required>
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </div>
        </div>
        <div class="form-group">
          <label for="signup-password">Password</label>
          <div class="input-wrap">
            <input type="password" id="signup-password" placeholder="At least 6 characters" autocomplete="new-password" required>
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </div>
        </div>
        <div class="form-group">
          <label for="signup-salary">Monthly salary (₹)</label>
          <div class="input-wrap">
            <input type="number" id="signup-salary" placeholder="e.g. 50000" min="0" required>
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12"/><path d="M6 8h12"/><path d="M6 13l8.5 8"/><path d="M6 13h3a4.5 4.5 0 1 0 0-9"/></svg>
          </div>
        </div>
        <button type="submit" class="btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
          Create account
        </button>
      </form>

    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/admin-config.js"></script>
  <script src="js/pwa.js"></script>

  <script>
    const loadingCard = document.getElementById("loading-card");
    const authCard = document.getElementById("auth-card");
    const statusMsg = document.getElementById("status-msg");
    const tabLogin = document.getElementById("tab-login");
    const tabSignup = document.getElementById("tab-signup");
    const loginForm = document.getElementById("login-form");
    const signupForm = document.getElementById("signup-form");

    function showError(text) {
      statusMsg.textContent = text;
      statusMsg.className = "status-msg error";
    }
    function hideError() {
      statusMsg.className = "status-msg hidden";
    }

    function switchTab(which) {
      hideError();
      if (which === "login") {
        tabLogin.classList.add("active");
        tabSignup.classList.remove("active");
        loginForm.classList.remove("hidden");
        signupForm.classList.add("hidden");
      } else {
        tabSignup.classList.add("active");
        tabLogin.classList.remove("active");
        signupForm.classList.remove("hidden");
        loginForm.classList.add("hidden");
      }
    }
    tabLogin.addEventListener("click", function () { switchTab("login"); });
    tabSignup.addEventListener("click", function () { switchTab("signup"); });

    document.getElementById("forgot-link").addEventListener("click", async function (e) {
      e.preventDefault();
      const prefilled = document.getElementById("login-email").value.trim();
      const email = await showPrompt({
        title: "Reset Password",
        placeholder: "you@gmail.com",
        defaultValue: prefilled,
        confirmText: "Send reset link"
      });
      if (!email) return;
      if (!isGmail(email)) {
        showToast("Only @gmail.com addresses allowed.", "error");
        return;
      }
      try {
        await sendPasswordReset(email);
        showToast("Reset link sent! Check your email.", "success");
      } catch (err) {
        showToast(friendlyAuthError(err), "error");
      }
    });

    (async function init() {
      const user = await waitForAuth();
      if (user) {
        window.location.href = isAdmin(user) ? "admin.html" : "dashboard.html";
        return;
      }
      loadingCard.classList.add("hidden");
      authCard.classList.remove("hidden");
    })();

    function isGmail(email) {
      return /^[^\s@]+@gmail\.com$/i.test(email);
    }

    loginForm.addEventListener("submit", async function (e) {
      e.preventDefault();
      hideError();
      const email = document.getElementById("login-email").value.trim();
      const password = document.getElementById("login-password").value;
      if (!isGmail(email)) return showError("Only @gmail.com email addresses are allowed.");
      if (isAdminEmail(email)) {
        showError("Admin must use the Admin Login page.");
        setTimeout(function () { window.location.href = "admin-login.html"; }, 1200);
        return;
      }
      try {
        await signIn(email, password);
        window.location.href = "dashboard.html";
      } catch (err) {
        showError(friendlyAuthError(err));
      }
    });

    signupForm.addEventListener("submit", async function (e) {
      e.preventDefault();
      hideError();
      const name = document.getElementById("signup-name").value.trim();
      const email = document.getElementById("signup-email").value.trim();
      const password = document.getElementById("signup-password").value;
      const salary = Number(document.getElementById("signup-salary").value);

      if (!name) return showError("Please enter your name.");
      if (!isGmail(email)) return showError("Only @gmail.com email addresses are allowed.");
      if (isAdminEmail(email)) return showError("This email is reserved. Use the Admin Login page.");
      if (!salary || salary < 0) return showError("Please enter a valid salary.");

      try {
        const user = await signUp(email, password);
        await db.collection("users").doc(user.uid).set({
          name: name,
          salary: salary,
          email: email,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        window.location.href = "dashboard.html";
      } catch (err) {
        showError(friendlyAuthError(err));
      }
    });
  </script>
</body>
</html>
