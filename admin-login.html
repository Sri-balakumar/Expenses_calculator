<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Expense Calculator</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6366f1">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <script src="js/theme.js"></script>
</head>
<body class="auth-page">
  <div class="container container-narrow">

    <div class="auth-brand">
      <div class="auth-logo">🛡️</div>
      <h1>Admin Panel</h1>
      <p class="subtitle">Authorized personnel only.</p>
    </div>

    <div id="loading-card" class="card">
      <p class="muted">Loading...</p>
    </div>

    <div id="auth-card" class="card hidden">

      <div class="tab-toggle">
        <button class="tab-btn active" id="tab-login">Log In</button>
        <button class="tab-btn" id="tab-signup">Sign Up</button>
      </div>

      <div id="status-msg" class="status-msg error hidden"></div>

      <!-- LOGIN -->
      <form id="login-form" class="auth-form">
        <div class="form-group">
          <label for="login-email">Admin email</label>
          <div class="input-wrap">
            <input type="email" id="login-email" placeholder="admin@gmail.com" autocomplete="email" required>
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </div>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <div class="input-wrap">
            <input type="password" id="login-password" placeholder="Your password" autocomplete="current-password" required>
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </div>
        </div>
        <button type="submit" class="btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Enter admin panel
        </button>
      </form>

      <!-- SIGNUP (one-time setup) -->
      <form id="signup-form" class="auth-form hidden">
        <div class="status-msg info" style="margin-bottom:14px;">
          First-time setup: create the admin account.
        </div>
        <div class="form-group">
          <label for="signup-email">Admin email</label>
          <div class="input-wrap">
            <input type="email" id="signup-email" placeholder="admin@gmail.com" autocomplete="email" required>
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </div>
        </div>
        <div class="form-group">
          <label for="signup-password">Choose a password</label>
          <div class="input-wrap">
            <input type="password" id="signup-password" placeholder="At least 6 characters" autocomplete="new-password" required>
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </div>
        </div>
        <button type="submit" class="btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          Create admin account
        </button>
      </form>

      <p class="subtitle" style="text-align:center; margin: 18px 0 0; font-size: 0.85rem;">
        Not the admin? <a href="index.html">User login</a>
      </p>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/admin-config.js"></script>

  <script>
    const loadingCard = document.getElementById("loading-card");
    const authCard = document.getElementById("auth-card");
    const statusMsg = document.getElementById("status-msg");
    const tabLogin = document.getElementById("tab-login");
    const tabSignup = document.getElementById("tab-signup");
    const loginForm = document.getElementById("login-form");
    const signupForm = document.getElementById("signup-form");

    function showError(text) {
      statusMsg.textContent = text;
      statusMsg.className = "status-msg error";
    }
    function hideError() { statusMsg.className = "status-msg hidden"; }

    function switchTab(which) {
      hideError();
      if (which === "login") {
        tabLogin.classList.add("active");
        tabSignup.classList.remove("active");
        loginForm.classList.remove("hidden");
        signupForm.classList.add("hidden");
      } else {
        tabSignup.classList.add("active");
        tabLogin.classList.remove("active");
        signupForm.classList.remove("hidden");
        loginForm.classList.add("hidden");
      }
    }
    tabLogin.addEventListener("click", function () { switchTab("login"); });
    tabSignup.addEventListener("click", function () { switchTab("signup"); });

    (async function init() {
      const user = await waitForAuth();
      if (user) {
        if (isAdmin(user)) {
          window.location.href = "admin.html";
          return;
        } else {
          await auth.signOut();
        }
      }
      loadingCard.classList.add("hidden");
      authCard.classList.remove("hidden");
    })();

    loginForm.addEventListener("submit", async function (e) {
      e.preventDefault();
      hideError();
      const email = document.getElementById("login-email").value.trim();
      const password = document.getElementById("login-password").value;

      if (!isAdminEmail(email)) {
        showError("This page is for admin only.");
        return;
      }
      try {
        await signIn(email, password);
        window.location.href = "admin.html";
      } catch (err) {
        showError(friendlyAuthError(err));
      }
    });

    signupForm.addEventListener("submit", async function (e) {
      e.preventDefault();
      hideError();
      const email = document.getElementById("signup-email").value.trim();
      const password = document.getElementById("signup-password").value;

      if (!isAdminEmail(email)) {
        showError("Only the configured admin email (" + ADMIN_EMAIL + ") can sign up here.");
        return;
      }
      if (!password || password.length < 6) {
        showError("Password must be at least 6 characters.");
        return;
      }
      try {
        await signUp(email, password);
        showToast("Admin account created!", "success");
        window.location.href = "admin.html";
      } catch (err) {
        if (err && err.code === "auth/email-already-in-use") {
          showError("Admin account already exists. Switch to the Log In tab.");
        } else {
          showError(friendlyAuthError(err));
        }
      }
    });
  </script>
</body>
</html>
